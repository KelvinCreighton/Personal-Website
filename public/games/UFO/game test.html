<!DOCTYPE html><html><body>  <center><canvas id="myCanvas" width="600" height="420" style="border:3px solid #d3d3d3;"></canvas><p id="display">&nbsp;</p><p id="display2">&nbsp;</p></center><script>//canvas varsvar canvas = document.getElementById("myCanvas");var ctx = canvas.getContext("2d");var cWidth = canvas.width;var cHeight = canvas.height;test();function test() {	ctx.beginPath();	ctx.fillStyle="#ff0000";	ctx.arc(cWidth / 2, cHeight / 2, 25, Math.PI / 2, Math.PI * 1.5);	ctx.fill();} </script></body></html>
