<!DOCTYPE html>
<html>
<head>
<style>
/* Prevent the arrow keys and spacebar from scrolling the page */
body {
  overflow-y: auto; /* Allow the browser to decide when to show the scrollbar */
}

/* Force custom scrollbar styles for WebKit browsers (Chrome, Safari, Edge) to ensure visibility */
::-webkit-scrollbar {
  width: 12px;
  background-color: #f1f1f1;
}

::-webkit-scrollbar-thumb {
  background-color: #c1c1c1;
  border-radius: 6px;
  border: 2px solid #f1f1f1;
}

::-webkit-scrollbar-thumb:hover {
  background-color: #a8a8a8;
}

/* Firefox scrollbar styling */
* {
  scrollbar-color: #c1c1c1 #f1f1f1;
}

/* Media query to adapt the scrollbar for dark mode */
@media (prefers-color-scheme: dark) {
  ::-webkit-scrollbar {
    background-color: #2d3748; /* Matches Tailwind gray-800 */
  }

  ::-webkit-scrollbar-thumb {
    background-color: #6b7280; /* Lighter gray thumb for dark mode */
    border: 2px solid #2d3748;
  }

  ::-webkit-scrollbar-thumb:hover {
    background-color: #9ca3af; /* Even lighter gray when hovered in dark mode */
  }

  /* Firefox dark mode scrollbar */
  * {
    scrollbar-color: #6b7280 #2d3748;
  }
}
</style>
</head>
